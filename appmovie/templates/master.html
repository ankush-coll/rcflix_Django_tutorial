{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCFlix Movies and shows</title>
<link rel="icon" type="image/x-icon" href="{% static 'appmovie/favicon.png' %}">
<link rel="stylesheet" href="{% static 'appmovie/master.css' %}">

{% block page_css %}{% endblock %}
</head>

<body>
<header class="navbar">
      <div class="page-links">
        <h1 class="logo">RCFlix</h1>
        <nav>
          <a href="{% url 'home' %}">Home</a>
          <a href="{% url 'series' %}">Series</a>
          <a href="{% url 'home' %}">Films</a>
          <a href="#">New & Popular</a>
          <a href="{% url 'list' %}">My List</a>
          <!-- <a href="#">Browse by languages</a> -->
        </nav>
        <nav class="navb">
          <a href="{% url 'search_multi' %}" class="search-link"><span class="search-icon">🔍</span></a>
          {% if user.is_authenticated %}
          <img style="width: 40px; height: 40px; border-radius: 20%; margin-right: 20px;" src="{% static user.profile.avatar %}" alt="User Avatar" class="avatar">
            <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="logout_button" type="submit">Logout</button>
    </form>
          {% endif %}
        </nav>
      </div>
    </header>

    {% block content %}
    {% endblock %}
  
</body>

<script type="module">
    import ScrollBar from "../static/appmovie/scroll.js";
    ScrollBar();
</script>

<style>
  .logo {
  color: red;
  font-size: 32px;
  font-weight: bold;
  margin-right: 30px;
  margin-left: 20px;
}

.footer {
    position: relative;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: #aaa;
    text-align: center;
    padding: 15px 0;
    font-size: 14px;
    border-top: 1px solid #222;
    margin-top: 240px;
}

.footer-links {
    margin-top: 5px;
}

.footer-links a {
    color: #aaa;
    margin: 0 10px;
    text-decoration: none;
    transition: 0.2s;
}

.footer-links a:hover {
    color: white;
}
</style>
<footer class="footer">
    <p>© 2026 RCFlix. All rights reserved.</p>
    <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>
</footer>
</html>
