{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'appmovie/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'appmovie/login.css' %}"/>
    <title>RCFlix - Login</title>
</head>

<body>
<div class="background-overlay"></div>

<div class="login-wrapper">
    <div class="login-box">

        <h1 class="logo">RCFlix</h1>
        <h2>Sign In</h2>

        {% if form.errors %}
        <div class="error-box">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="input-group">
                {{ form.username }}
            </div>

            <div class="input-group">
                {{ form.password }}
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <p class="register-text">
            New to RCFlix? 
            <a href="{% url 'register' %}">Sign up now</a>
        </p>

    </div>
</div>
</body>
</html>
