{% extends 'master.html' %}
{% load static %}

{% block content %}
<h2 style="display: flex; justify-content: center; align-items: center; margin-top: 100px;">Watchlist of {{user}}</h2>
{% for like in likes %}
    <div>
        <img src="{% static like.image %}" width="100">
        <p>{{ like.movie_name }}</p>
    </div>
{% endfor %}

{% endblock %}
